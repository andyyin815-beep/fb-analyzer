<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>找出在Facebook中最關心你的朋友</title>
  
  <link rel="stylesheet" type="text/css" href="//cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/2.3.1/css/bootstrap.min.css" />

<body>
  <div class="container" style="margin-top: 20px;">
    <header class="page-header">
      <h1>找出在Facebook中最關心你的朋友</h1>
    </header>
    
    <div class="description">
      <p style="color:red; font-weight:bold;">※請使用在自己的臉書帳號，不要去擅自或強迫查看他人的，以免造成法律或感情問題。※</p>
    </div>
    
    <div id="steps">
      <h4>步驟</h4>
      <ol>
        <li id="login">請稍候...</li>
        <li id="view-src">
          <div>打開你的 Facebook 首頁 → 鼠標右鍵點擊頁面的空白處 → 查看網頁原始碼 (或按 Ctrl+U / ⌘+U)</div>
        </li>
        <li>全選(Ctrl+A) → 複製(Ctrl+C)</li>
        <li id="input-wrapper">
          貼到 ▼<br>
          <textarea id="input" class="input span6 pull-left" disabled placeholder="貼到這裡 (Ctrl + V)"></textarea>
        </li>
        <li id='analysis-button' class="hide">
          <input type="button" value="分析" />
        </li>
      </ol>
    </div>
    
    <div id="loading-preload"></div>

    <div id="result" class="hide">
      <h4>結果如下</h4>
      <div class="clearfix" id="result-content" data-loading='<div class="loading"><span></span></div>'></div>
    </div>
  </div>

  <script>
    var MOBILE_DEVICE = "desktop classic",
        IS_DESKTOP = true,
        APP_URI = '/facebook/friends-list/',
        I18N = {
          login_first: "請先Facebook登錄。",
          login_desc: "Facebook 改變規則了，現在要登入才行。",

        },
        FB_APP_ID = '411032122400925',
        FB_APP_VER = 'v6.0',
