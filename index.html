<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>找出在Facebook中最關心你的朋友</title>
    <style>
        body { font-family: "微軟正黑體", sans-serif; background: #fafafa; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 20px auto; background: #fff; padding: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px; }
        h1 { text-align: center; color: #2c3e50; font-size: 28px; }
        .warning { color: #d35400; text-align: center; font-weight: bold; margin: 20px 0; }
        ol { line-height: 2; font-size: 16px; }
        textarea { width: 100%; height: 200px; padding: 15px; font-size: 14px; margin-top: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical; }
        .analyze-btn { background: #3498db; color: white; border: none; padding: 12px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        .analyze-btn:hover { background: #2980b9; }
        .hide { display: none !important; }
        #result { margin-top: 40px; padding-top: 20px; border-top: 2px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>找出在Facebook中最關心你的朋友</h1>
    <div class="warning">※請使用在自己的臉書帳號，不要去擅自或強迫查看他人的，以免造成法律或感情問題。※</div>

    <div id="steps">
        <h3>操作步驟</h3>
        <ol>
            <!-- 隱藏腳本需要的標籤 -->
            <li id="login" class="hide">請稍候...</li>
            
            <li id="view-src">打開你的 Facebook 首頁 → 點擊右鍵選擇「查看網頁原始碼」(或按 Ctrl+U)</li>
            <li>在原始碼頁面全選 (Ctrl+A) → 複製 (Ctrl+C)</li>
            <li id="input-wrapper">
                貼到下方框框 ▼
                <!-- 文字框已解鎖，可直接貼上 -->
                <textarea id="input" placeholder="請將原始碼貼到這裡 (Ctrl + V)"></textarea>
            </li>
            
            <!-- 按鈕已強制顯示，貼上後請手動點擊 -->
            <li id="analysis-button" style="list-style: none; text-align: center;">
                <input type="button" class="analyze-btn" value="開始分析" />
            </li>
        </ol>
    </div>

    <!-- 結果顯示區 -->
    <div id="result" class="hide">
        <h2 style="color: #27ae60;">🎉 分析結果</h2>
        <div id="result-content"></div>
    </div>
</div>

<!-- 系統核心設定 -->
<script>
    var MOBILE_DEVICE = "desktop classic",
        IS_DESKTOP = true,
        APP_URI = '/facebook/friends-list/',
        I18N = {
            login_first: "請先登入 Facebook。",
            error_general: "這不是有效的原始碼，請重新複製。",
            error_no_friends: "抱歉！好友列表是空的。",
            parsing_error: "解析錯誤。這通常是因為 Facebook 已經更改了網頁結構。"
        },
        FB_APP_ID = '411032122400925',
        FB_APP_VER = 'v6.0',
        FB_LANG = 'zh_TW',
        SOURCE_ONLY = 1;
</script>

<!-- 載入外部分析腳本 -->
<script src="https://assets.piliapp.com/v3/asand_9xuix.js" crossorigin></script>

</body>
</html>
