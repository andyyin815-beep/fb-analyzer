<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>找出在Facebook中最關心你的朋友</title>
    
    <style>
        /* 基礎全域設定 */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "微軟正黑體", sans-serif;
            color: #333;
            background-color: #fff;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 850px;
            margin: 40px auto;
        }
        
        /* 標題設定 */
        h1.title {
            text-align: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: #3b3b3b;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        /* 淺色分隔線 */
        hr.divider {
            border: 0;
            border-top: 1px solid #f0f0f0;
            margin: 20px 0;
        }
        
        /* 紅色警告標語 */
        .warning-text {
            text-align: center;
            color: #ff0000;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }
        
        /* 步驟區塊標題 */
        h3.steps-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #444;
        }
        
        /* 步驟清單 */
        ol.steps-list {
            font-size: 1.15rem;
            line-height: 1.8;
            padding-left: 25px;
            color: #333;
        }
        
        ol.steps-list li {
            margin-bottom: 5px;
        }
        
        /* 輸入框設定 */
        .textarea-container {
            margin-top: 5px;
        }
        
        textarea#input {
            width: 100%;
            max-width: 600px;
            height: 70px;
            background-color: #f1f1f1;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 1.05rem;
            color: #333;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }
        
        textarea#input::placeholder {
            color: #999;
        }

        textarea#input:focus {
            border-color: #aaa;
            background-color: #fff;
        }
        
        /* 隱藏元件用的 Class */
        .d-none { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 主標題 -->
    <h1 class="title">找出在Facebook中最關心你的朋友</h1>
    
    <!-- 分隔線 -->
    <hr class="divider">
    
    <!-- 紅字警告 -->
    <div class="warning-text">
        ※請使用在自己的臉書帳號，不要去擅自或強迫查看他人的，以免造成法律或感情問題。※
    </div>

    <!-- 步驟區塊 -->
    <h3 class="steps-title">步驟</h3>
    <ol class="steps-list">
        <li>打開你的 Facebook 首頁 → 鼠標右鍵點擊頁面的空白處 → 查看網頁原始碼 (或按 Ctrl+U / ⌘+U)</li>
        <li>全選(Ctrl+A) → 複製(Ctrl+C)</li>
        <li>貼到 ▼
            <div class="textarea-container">
                <textarea id="input" placeholder="貼到這裡 (Ctrl + V)"></textarea>
            </div>
        </li>
        
        <!-- 隱藏的分析按鈕，保留給 JS 判定/顯示用 -->
        <li id="analysis-button" class="d-none">
            <input type="button" value="分析" style="margin-top:10px; padding: 5px 15px; cursor: pointer;" />
        </li>
    </ol>

    <!-- 結果顯示區塊 (預設隱藏，分析完畢後由腳本動態插入內容) -->
    <div id="result" class="d-none" style="margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px;">
        <h4 style="font-weight:bold; color:#333;">結果如下</h4>
        <div id="result-content"></div>
    </div>
</div>

<!-- 核心設定與 JavaScript (保留原始分析邏輯與設定檔) -->
<script>
    // 若為舊版 IE 瀏覽器，則顯示手動分析按鈕
    if(navigator.userAgent.indexOf('MSIE') !== -1) {
        document.querySelector("#analysis-button").classList.remove('d-none');
    }

    var MOBILE_DEVICE = "desktop classic",
        IS_DESKTOP = true,
        APP_URI = '/facebook/friends-list/',
        I18N = {
            login_first: "請先Facebook登錄。",
            login_desc: "Facebook 改變規則了，現在要登入才行。",
            error_general: "這不是一個有效的頁面的源代碼。請重新按照步驟。",
            error_no_friends: "抱歉!好友列表是空的。",
            error_visit_www: "請訪問 https://www.facebook.com 而不是 https://m.facebook.com",
            error_old_browser: "您正在使用的瀏覽器不受 Facebook 支持。請升級至較新的瀏覽器。",
            parsing_error: "HTML代碼解析錯誤。請告知我們。"
        },
        FB_APP_ID = '411032122400925',
        FB_APP_VER = 'v6.0',
        FB_LANG = 'zh_TW',
        SOURCE_ONLY = 1;
</script>
<!-- 載入核心解析腳本 -->
<script src="https://assets.piliapp.com/v3/asand_9xuix.js" crossorigin></script>

</body>
</html>
